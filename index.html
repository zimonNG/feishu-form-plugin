<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>表单链接汇总</title>
  <script src="https://sf3-cn.feishucdn.com/obj/open-platform-opensdk/lark/2.1.14/lark.js"></script>
  <style>
    body { padding: 15px; font-size: 14px; }
    .item { margin: 8px 0; padding: 6px; border: 1px solid #eee; border-radius: 4px; }
    .btn { background: #2663eb; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin: 10px 0; }
  </style>
</head>
<body>
    <button class="btn" onclick="getAllForm()">获取本表所有表单链接</button>
    <button class="btn" onclick="copyAll()">一键复制所有链接</button>
    <div id="list"></div>

    <script>
        let copyText = "";
        lark.init({ appId: "cli_aa8028ca6d38dbeb" });

        async function getAllForm() {
            copyText = "";
            document.getElementById("list").innerHTML = "加载中...";
            try {
                // 直接用飞书SDK自带方法获取数据，不用fetch和token
                const tableList = await lark.bitable.listTables();  
                let html = "";
                tableList.forEach(async (table) => {
                    const views = await lark.bitable.listViews({ table_id: table.table_id });
                    views.forEach(item => {
                        if (item.type === "form") {
                            let formLink = `https://feishu.cn/form/${item.view_id}`;
                            html += `<div class="item">${item.name}：<a href="${formLink}" target="_blank">${formLink}</a></div>`;
                            copyText += `${item.name}：${formLink}\n`;
                        }
                    });
                    document.getElementById("list").innerHTML = html || "未找到任何表单";
                });
            } catch (err) {
                document.getElementById("list").innerHTML = `获取失败：${err.message}`;
            }
        }

        function copyAll() {
            if (!copyText) {
                alert("请先获取表单链接！");
                return;
            }
            navigator.clipboard.writeText(copyText).then(() => {
                alert("已复制到剪贴板！");
            }).catch(err => {
                alert("复制失败，请手动复制");
            });
        }
    </script>
</body>
</html>
