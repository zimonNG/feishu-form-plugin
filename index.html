<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>깊데졍쌈삠悧</title>
    <script src="https://sf3-cn.feishucdn.com/obj/open-platform-opensdk/lark/2.1.14/lark.js"></script>
    <style>
        body { padding: 15px; font-size: 14px; }
        .item { margin: 8px 0; padding: 6px; border: 1px solid #eee; border-radius: 4px; }
        .btn { background: #2663eb; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin: 10px 0; }
    </style>
</head>
<body>
    <button class="btn" onclick="getAllForm()">삿혤굶깊杰唐깊데졍쌈</button>
    <button class="btn" onclick="copyAll()">寧숩릿齡杰唐졍쌈</button>
    <div id="list"></div>

    <script>
        let copyText = "";
        lark.init({ appId: "cli_aa8028ca6d38dbeb" });

        async function getAllForm() {
            copyText = "";
            document.getElementById("list").innerHTML = "속潼櫓...";
            try {
                let res = await lark.bitable.getActiveTable();
                let baseId = res.baseId;
                let views = await getViewList(baseId);
                let html = "";
                views.forEach(item => {
                    if (item.type === "form") {
                        let formLink = `https://feishu.cn/form/${item.view_id}`;
                        html += `<div class="item">${item.name}：<a href="${formLink}" target="_blank">${formLink}</a></div>`;
                        copyText += `${item.name}：${formLink}\n`;
                    }
                });
                document.getElementById("list").innerHTML = html || "灌冷돕훨부깊데";
            } catch (err) {
                document.getElementById("list").innerHTML = `삿혤呵겨：${err.message}`;
            }
        }

        async function getViewList(baseId) {
            try {
                let tokenRes = await lark.auth.getTenantAccessToken();
                let token = tokenRes.tenant_access_token;
                let url = `https://open.feishu.cn/open-apis/bitable/v1/apps/${baseId}/tables?page_size=100`;
                let resp = await fetch(url, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                let json = await resp.json();
                let allViews = [];
                if (json.data && json.data.items) {
                    json.data.items.forEach(table => {
                        if (table.views) table.views.forEach(v => allViews.push(v));
                    });
                }
                return allViews;
            } catch (err) {
                throw new Error("삿혤柬暠죗깊呵겨：" + err.message);
            }
        }

        function copyAll() {
            if (!copyText) {
                alert("헝邱삿혤깊데졍쌈！");
                return;
            }
            navigator.clipboard.writeText(copyText).then(() => {
                alert("綠릿齡돕숏季겼！");
            }).catch(err => {
                alert("릿齡呵겨，헝癎땡릿齡");
            });
        }
    </script>
</body>
</html>
