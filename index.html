<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>表单链接工具</title>
  <script src="https://lf6-cn-toutiao.byteintl.net/obj/feishu-open-platform/feishu-sdk/feishu-sdk.min.js"></script>
  <style>
    *{margin:0;padding:10px;box-sizing:border-box;font-family:system-ui;}
    button{padding:12px 16px;background:#0066ff;color:white;border:none;border-radius:8px;margin:10px;cursor:pointer;}
    #result{white-space:pre-wrap;line-height:1.6;}
  </style>
</head>
<body>
  <button onclick="getForms()">获取所有表单链接</button>
  <button onclick="copyAll()">复制全部链接</button>
  <div id="result"></div>

  <script>
    let allLinks = "";
    const $ = id => document.getElementById(id);

    async function getForms() {
      try {
        $("result").innerText = "加载中...";
        const info = await window.feishu.bitable.getAppInfo();
        const tables = await window.feishu.bitable.listTables();
        let text = "";
        allLinks = "";

        for (let table of tables) {
          const views = await window.feishu.bitable.listViews({ table_id: table.table_id });
          for (let v of views) {
            if (v.type === "form") {
              const url = `https://feishu.cn/form/${v.view_id}`;
              text += `${v.name}\n${url}\n\n`;
              allLinks += `${v.name}：${url}\n`;
            }
          }
        }
        $("result").innerText = text || "未找到表单";
      } catch (e) {
        $("result").innerText = "错误：" + e.message;
      }
    }

    function copyAll() {
      if (!allLinks) return alert("请先获取表单");
      navigator.clipboard.writeText(allLinks).then(()=>alert("复制成功！"));
    }
  </script>
</body>
</html>
